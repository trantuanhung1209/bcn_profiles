name: Notify via email
on:
  push:
    branches: [ main ]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Có code push mới lên main nè!!!"
          body: |
            Có push mới lên nhánh main của repo bcn_profiles.
            Nhấn vào link dưới để bắt đầu deploy nha

            https://github.com/trantuanhung1209/bcn_profiles/actions/workflows/deploy.yml

          to: "${{ secrets.EMAIL_USER }}"
          from: "CI/CD Bot <${{ secrets.EMAIL_USER }}>"
